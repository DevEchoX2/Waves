<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waves | Browser</title>
    <link rel="shortcut icon" href="/assets/fav.png" type="image/x-icon" id="tabIcon">
    <link rel="stylesheet" href="/styles/index.css">
    <link rel="stylesheet" href="/assets/css/browser.css">
    <link rel="stylesheet" href="/assets/css/colors.css" id="css-theme-link">
    <link rel="stylesheet" href="/assets/css/font.css">
    <script src="/assets/js/t.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/assets/js/color.js"></script>
    <script src="/homework/math.all.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda@3.4.3/eruda.min.js"></script>
    <script>
        async function swium() {
            await navigator.serviceWorker.register("/sw.js").then(() => {
                console.log(
                    "%ccherri" + "%c SJ sw registered!",
                    "color: white; background: linear-gradient(to bottom right, #e2588d, #dbd7d7); border-radius: 5px; font-weight: bold; padding: 6px; font-family: monospace;",
                    "color: white; background: transparent; border-radius: 0px; padding: 0px;"
                );
            }).catch(e => {
                console.log("Error registering service worker (SJ): " + e)
            });
        }

        window.addEventListener("load", () => {
            swium();
            if (window.lucide) setTimeout(() => lucide.createIcons(), 0);
        });
    </script>
    <script src="/assets/js/browserfunctions.js"></script>
</head>

<body>
    <div class="bottom-left" id="leftPanel">
      <div class="nav-modal" id="navModal">
        <button class="home-toggle" id="navToggle" type="button">
          <span class="home-icon"><i data-lucide="house"></i></span>
          <span class="home-label">Home</span>
        </button>
        <div class="nav-items">
          <a class="nav-item" href="/index.html"><i data-lucide="house"></i><span>Home</span></a>
          <a class="nav-item" href="/pages/ai.html"><i data-lucide="brain-circuit"></i><span>AI</span></a>
          <a class="nav-item" href="/pages/chat.html"><i data-lucide="messages-square"></i><span>Chat</span></a>
          <a class="nav-item" href="/pages/watch.html"><i data-lucide="eye"></i><span>Watch</span></a>
          <a class="nav-item" href="/pages/music.html"><i data-lucide="music"></i><span>Music</span></a>
          <a class="nav-item" href="/pages/browser.html"><i data-lucide="compass"></i><span>Browse</span></a>
          <a class="nav-item" href="/pages/settings.html"><i data-lucide="settings"></i><span>Settings</span></a>
        </div>
      </div>
    </div>

    <div class="nav-logo">
        <img src="/assets/fav.png" alt="Logo" onclick="
            const ul = document.querySelector('.nav-items');
            if(ul) {
                ul.classList.add('active');
                const blurr = document.createElement('div');
                blurr.classList.add('bluroverlay');
                document.body.append(blurr);
                blurr.addEventListener('click', () => {
                    ul.classList.remove('active');
                    blurr.remove();
                });
            }
        ">
    </div>

    <div class="browser-container">
        <div class="browser-controls">
            <div class="tabs">
                <button class="newtab" onclick="newTab()">
                    <i data-lucide="plus"></i>
                </button>
            </div>
            <div class="browser-buttons">
                <div class="hcontainer">
                    <button onclick="b()" title="Back">
                        <i data-lucide="chevron-left"></i>
                    </button>
                    <button onclick="f()" title="Forward">
                        <i data-lucide="chevron-right"></i>
                    </button>
                    <button onclick="r()" title="Reload">
                        <i data-lucide="rotate-ccw"></i>
                    </button>
                    <input type="text" id="searchbar" placeholder="Search for anything or enter a URL...">
                    <button onclick="full()" title="Fullscreen">
                        <i data-lucide="maximize"></i>
                    </button>
                    <button onclick="launchEruda()" title="Developer Tools">
                        <i data-lucide="code"></i>
                    </button>
                    <button onclick="location.href = '/'" title="Exit to Home">
                        <i data-lucide="home"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="browser-loading"></div>
    </div>

    <script src="/assets/js/nav.js" defer></script>
    <script defer>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof newTab === 'function') {
                newTab();
            }
        });
    </script>
</body>
</html>
